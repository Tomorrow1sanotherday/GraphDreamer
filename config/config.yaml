# Dataset configuration
dataset:
  name: "cub_200_2011"
  domain: "photo"
  loader: "huggingface"
  path: "/mnt/sda/runhaofu/huggingface_cache/efekankavalci___cub_200_2011"
  splits:
    train: "train"
    test: "test"
  image_column: "image"
  label_column: "label"
  label_name_column: null
  strip_label_prefix: true
  cache:
    test_features_path: "./features/cub_200_2011_real_test_features.npz"

# Model configuration
model:
  vision_encoder: "openai/clip-vit-large-patch14"  # or "facebook/dinov2-giant"
  feature_dim: 768  # 768 for CLIP-ViT-L, 1536 for DinoV2-giant
  
# Training configuration
training:
  classifier: "logistic_regression"  # logistic_regression, svm, mlp
  test_size: 0.2
  random_state: 42
  max_iter: 1000

# Paths
paths:
  features_dir: "./features"
  models_dir: "./saved_models"
  results_dir: "./results"
